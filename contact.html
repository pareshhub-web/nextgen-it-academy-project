<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Next Gen IT Academy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Contact Hero -->
    <section class="contact-hero">
        <h1>Contact Us</h1>
        <p>Get in touch with us for admissions and course information.</p>
    </section>

    <!-- Contact Section -->
    <section class="contact">

        <div class="contact-info">
            <h2>Get In Touch</h2>

            <div class="card">
                <h3>Email</h3>
                <p>info@nextgenitacademy.com</p>
            </div>

            <div class="card">
                <h3>Phone</h3>
                <p>+91 7038816937</p>
            </div>

            <div class="card">
                <h3>Location</h3>
                <p>Mumbai, Maharashtra, India</p>
            </div>
        </div>

        <div class="contact-form">
            <h2>Send Message</h2>

            <form>
                <input type="text" placeholder="Enter Your Name" required>

                <input type="email" placeholder="Enter Your Email" required>

                <input type="tel" placeholder="Enter Your Phone Number" required>

                <textarea rows="5" placeholder="Enter Your Message" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>

    </section>

    <footer>
        <p>&copy; 2026 Next Gen IT Academy. All Rights Reserved.</p>
    </footer>

</body>
</html>
